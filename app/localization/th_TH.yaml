ERROR:
    TOKEN_INVALID: |-
        โทเค็นเซิร์ฟเวอร์ที่ให้มาไม่ถูกต้องหรือหมดอายุ

        กรุณาสร้างโทเค็นใหม่จากหน้าบัญชี Klei แล้ววางในช่อง Server Token
    TOKEN_EMPTY: ต้องใช้โทเค็นเซิร์ฟเวอร์เพื่อเปิด Dedicated Server วางเมาส์บนไอคอน ⓘ เพื่อดูวิธีขอโทเค็น
    GENERAL: |-
        เกิดข้อผิดพลาดขณะเปิดเซิร์ฟเวอร์

        อาจเกิดจากไฟล์เกมหายไป โฟลเดอร์เกมไม่ถูกต้อง หรือปัญหาสิทธิ์ กรุณาตรวจสอบ log เซิร์ฟเวอร์เพื่อดูรายละเอียด
    START_FAILED: |-
        ไม่สามารถเริ่ม shard {shard} ได้

        ไม่สามารถเรียกใช้โปรแกรมเซิร์ฟเวอร์ กรุณาตรวจสอบ:
        • โฟลเดอร์เกมถูกต้อง
        • ไฟล์เกมไม่เสียหาย (ตรวจสอบความสมบูรณ์ผ่าน Steam)
        • ไม่มีโปรแกรมป้องกันไวรัสบล็อกไฟล์
    PORTS: |-
        เซิร์ฟเวอร์ไม่สามารถเริ่มได้เนื่องจาก:

        • คลัสเตอร์ไม่ได้อยู่ในโฟลเดอร์เดียวกับโลกที่สร้างในเกม

        • พอร์ต ({ports}) ถูกใช้งานโดยโปรแกรมอื่นหรือเซิร์ฟเวอร์อื่น

        ปิดเซิร์ฟเวอร์อื่นที่กำลังรันอยู่ หรือเปลี่ยนพอร์ตในไฟล์ server.ini ของแต่ละ shard

        หากไม่ใช่ทั้งสองกรณี กรุณารายงานปัญหา
    EXCEPTION: |-
        เกิดข้อผิดพลาดที่ไม่คาดคิด!

        > {error}

        แอปจะรีสตาร์ท

        หากเซิร์ฟเวอร์กำลังรันอยู่ จะมีการบันทึกและปิดอย่างปลอดภัย

        กรุณารายงานปัญหานี้บน Github
    LAUNCH_DATA_INVALID: |-
        {APP_NAME} ต้องการข้อมูลการตั้งค่าเริ่มต้นของเซิร์ฟเวอร์ ซึ่งจะถูกสร้างเมื่อคุณเปิดโลกครั้งแรกจากเมนูในเกม

        กรุณาเปิดคลัสเตอร์จากเมนูในเกม รอให้เริ่มแล้วหยุดมัน

        เสร็จแล้วกดปุ่ม ลองใหม่ ด้านล่าง
    SERVER_CRASH: |-
        เซิร์ฟเวอร์ของคุณล่มเนื่องจาก Lua error กรุณาตรวจสอบ log ของเกม

        สาเหตุทั่วไป: mod ที่ไม่รองรับหรือล้าสมัย ข้อมูล save เสียหาย หรือบั๊กของเกม

        นี่เป็นปัญหาจากเกม ไม่ใช่ {APP_NAME} ลองปิด mod ที่เพิ่งเพิ่มมา หรือแจ้ง Klei
    DIRECTORY_INVALID: |-
        เส้นทาง {directory_name} ที่เลือกไม่ถูกต้องหรือไม่มีไฟล์ที่คาดหวัง

        กรุณาเลือกโฟลเดอร์ที่ถูกต้องก่อนเริ่มเซิร์ฟเวอร์
    COMMAND_FAILED: |-
        ไม่สามารถส่งคำสั่งไปยัง shard {shard} ได้

        กระบวนการเซิร์ฟเวอร์อาจไม่ตอบสนอง ตรวจสอบ log เซิร์ฟเวอร์เพื่อดูข้อผิดพลาด

