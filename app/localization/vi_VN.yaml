ENTRY:
    GAME_TITLE: Thư Mục Game
    CLUSTER_TITLE: Thư mục Cluster
    TOKEN_TITLE: Server Token
    ENTRY_INVALID_INPUT: "✱ Dữ liệu đầu vô không hợp lệ"

ERROR:
    TOKEN_INVALID: |-
        Server Token đã nhập không hợp lệ hoặc đã hết hạn.

        Vui lòng tạo một token mới trên trang Klei Account và dán nó chỗ Server Token.
    TOKEN_EMPTY: Cần có Server Token để chạy Dedicated Server. Di chuột qua biểu tượng ⓘ để coi hướng dẫn cách lấy.
    GENERAL: |-
        Đã xảy ra lỗi trong quá trình khởi chạy máy chủ.

        Nguyên nhân có thể do thiếu tệp tin game, sai thư mục game hoặc do vấn đề về quyền truy cập. Vui lòng kiểm tra nhật ký máy chủ để biết thêm chi tiết.
    START_FAILED: |-
        Không thể khởi động shard {shard}.

        Không thể kích hoạt tệp thực thi của máy chủ. Vui lòng kiểm tra thử:
        • Đường dẫn thư mục game đã chính xác chưa.
        • Các tệp tin game có bị lỗi không (xác thực tính toàn vẹn qua Steam).
        • Không có phần mềm diệt virus nào chặn tệp thực thi.
    PORTS: |-
        Máy chủ không thể khởi động do một trong các lý do sau:

        • Cluster không nằm cùng thư mục với các thế giới được tạo trong game.

        • Một hoặc nhiều cổng (port) ({ports}) hiện đang bị một chương trình khác sử dụng, bao gồm cả các máy chủ trong game.

        Đóng các máy chủ khác đang chạy hoặc thay đổi các cổng (port) trong tệp server.ini của từng shard.

        Nếu không phải các lý do trên, vui lòng báo cáo sự cố này.
    EXCEPTION: |-
        Đã xảy ra lỗi ngoài dự kiến!

        > {error}

        Ứng dụng sẽ được khởi động lại.

        Nếu có máy chủ nào đang chạy, nó sẽ được lưu lại và tắt một cách an toàn.

        Vui lòng cân nhắc báo cáo lỗi này bằng cách tạo một issue trên Github.
    LAUNCH_DATA_INVALID: |-
        {APP_NAME} cần dữ liệu cấu hình máy chủ ban đầu – dữ liệu này được tạo ra khi bạn chạy một thế giới lần đầu tiên từ menu trong game.

        Vui lòng khởi chạy bất kỳ cluster nào từ menu trong game, đợi nó khởi động xong rồi tắt đi.

        Sau khi hoàn tất, hãy nhấp vào nút Thử Lại bên dưới.
    SERVER_CRASH: |-
        Máy chủ của bạn đã bị crash do lỗi Lua. Vui lòng tham khảo các tệp nhật ký (log) của game để biết thêm thông tin.

        Các nguyên nhân phổ biến: mod không tương thích hoặc đã lỗi thời (outdated), dữ liệu lưu thế giới (world save) bị lỗi, hoặc do lỗi của game.
        
        Đây là do game crash, không phải lỗi của {APP_NAME}. Cân nhắc tắt các mod vừa thêm gần đây hoặc báo cáo sự cố cho Klei.
    DIRECTORY_INVALID: |-
        Đường dẫn {directory_name} đã chọn không hợp lệ hoặc không chứa các tệp tin cần thiết.

        Vui lòng chọn một thư mục hợp lệ trước khi khởi chạy máy chủ.
    COMMAND_FAILED: |-
        Không thể gởi lệnh đến shard {shard}.

        Tiến trình máy chủ có thể đã rơi vào trạng thái không phản hồi. Kiểm tra lỗi trong nhật ký máy chủ.

