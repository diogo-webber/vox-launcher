CLUSTER_GROUP_TOOLTIP: |-
    ➊    Chọn thư mục nơi bạn cài đặt game chỗ {GAME_TITLE}, nếu nó chưa được tự động phát hiện. 
    ➋    Tạo một thế giới bằng menu trong game và chọn thư mục của thế giới đó chỗ {CLUSTER_TITLE}.
    ➌    Dán Server Token chỗ {TOKEN_TITLE}. Di chuột qua biểu tượng ⓘ để coi hướng dẫn cách lấy.
    ➍    Cuối cùng, bấm nút {LAUNCH} và tận hưởng!

