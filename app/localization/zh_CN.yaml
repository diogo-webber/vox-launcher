ERROR:
    TOKEN_INVALID: |-
        提供的服务器令牌无效或者已过期。

        请在Klei账户页面生成新的令牌，并将其粘贴到服务器令牌字段中。
    TOKEN_EMPTY: 运行专用服务器需要服务器令牌。将鼠标悬停在 ⓘ 图标上以获取获取令牌的说明。
    GENERAL: |-
        启动服务器时出错。

        这可能是由于游戏文件缺失、游戏目录不正确或权限问题导致。请查看服务器日志以获取详细信息。
    START_FAILED: |-
        无法启动 {shard} 分片。

        服务器可执行文件无法启动。请确认：
        • 游戏目录路径正确。
        • 游戏文件未损坏（通过Steam验证完整性）。
        • 没有杀毒软件阻止可执行文件运行。
    PORTS: |-
        服务器未能启动，可能原因如下：

        • 集群未与游戏内生成的世界位于同一目录。

        • 以下一个或多个端口（{ports}）已被其他程序占用，包括游戏内服务器。

        请关闭其他正在运行的服务器或更改每个分片的 server.ini 文件中的端口。

        如果以上均不适用，请报告此问题。
    EXCEPTION: |-
        发生了意外错误！

        > {error}

        应用程序将重新启动。

        如果服务器正在运行，它将被保存并安全关闭。

        请考虑通过在GitHub上创建问题来报告此错误。
    LAUNCH_DATA_INVALID: |-
        {APP_NAME} 需要首次从游戏内菜单运行世界时生成的初始服务器配置数据。

        请从游戏内菜单启动任意集群，等待其启动，然后停止它。

        完成后，点击下方的重试按钮。
    SERVER_CRASH: |-
        您的服务器因Lua错误而崩溃。请查阅游戏的日志文件以获取更多信息。

        常见原因：不兼容或过时的模组、损坏的世界存档数据或游戏bug。

        这是游戏崩溃，而非 {APP_NAME} 的问题。请考虑禁用最近添加的模组或向Klei报告此问题。
    DIRECTORY_INVALID: |-
        所选的 {directory_name} 路径无效或不包含预期的文件。

        请在启动服务器之前选择有效的目录。
    COMMAND_FAILED: |-
        无法向 {shard} 分片发送命令。

        服务器进程可能已无响应。请检查服务器日志以查看错误。


